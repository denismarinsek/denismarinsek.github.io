<style>
:root {
    --green: #004B49;
    --green-hover: #006A4E;
    --bg: #f7f7f7;
    --text: #222;
    --muted: #444;
    --border: #d0d0d0;
    --shadow: 0 2px 8px rgba(0,0,0,0.05);
    --shadow-hover: 0 8px 18px rgba(0,0,0,0.10);
}

* {
    box-sizing: border-box;
}

html {
    overflow-y: scroll;
    scrollbar-gutter: stable;
}

body {
    font-family: 'Inter', Arial, sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
}

img, video, svg {
    max-width: 100%;
    height: auto;
}

/* HEADER */
.header {
    text-align: center;
    padding: 40px 20px;
    background: white;
    border-bottom: 1px solid #ececec;
}

.header h1 {
    margin: 0;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--green);
}

/* CONTENT */
.content {
    max-width: 1000px;
    margin: 0 auto;
    padding: 35px 20px 50px 20px;
}

/* HOME IKONA */
.back-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    margin-bottom: 25px;
    text-decoration: none;
    color: #222;
    background: #f0f0f0;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 20px;
    transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    box-shadow: var(--shadow);
}

.back-link:hover {
    background: var(--green);
    color: white;
    border-color: var(--green);
    box-shadow: var(--shadow-hover);
}

/* YEAR */
.year {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 20px;
    margin-top: 0;
    color: var(--text);
}

/* NASLOVI */
h3 {
    font-size: 22px;
    font-weight: 600;
    margin-top: 30px;
    margin-bottom: 10px;
    color: var(--text);
}

/* SEZNAM */
ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    margin: 14px 0;
    font-size: 18px;
}

/* GUMBI / ZAVIHKI */
.exam-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;          /* da ostane v eni vrstici */
    width: auto;
    min-width: 0;
    padding: 8px 14px;            /* ožji */
    background: white;
    color: var(--green);
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    border-radius: 6px;
    border: 1px solid var(--green);
    box-shadow: none;
    transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
}

.exam-button:hover {
    background: var(--green);
    color: white;
    border-color: var(--green);
    transform: none;              /* nič premika */
    box-shadow: none;
}

/* ČRTA */
hr {
    border: none;
    border-top: 1px solid #ddd;
    margin: 35px 0;
}

/* MOBILE */
@media (max-width: 700px) {
    .header h1 {
        font-size: 28px;
    }

    .content {
        padding: 25px 15px 40px 15px;
    }

    .year {
        font-size: 24px;
    }

    h3 {
        font-size: 20px;
    }

    li {
        font-size: 17px;
    }

    .back-link {
        width: 40px;
        height: 40px;
        font-size: 18px;
    }

    .exam-button {
        font-size: 14px;
        padding: 7px 12px;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>MTRD</h1>
</div>

<div class="content">

    <p class="year">2026/2027</p>

    <h3>Kolokviji</h3>
    <ul>
        <li><a class="exam-button" href="#">1. kolokvij</a></li>
        <li><a class="exam-button" href="#">2. kolokvij</a></li>
    </ul>

    <h3>Izpitni roki</h3>
    <ul>
        <li><a class="exam-button" href="#">1. redni rok</a></li>
        <li><a class="exam-button" href="#">2. redni rok</a></li>
        <li><a class="exam-button" href="#">3. redni rok</a></li>
    </ul>

    <hr>

</div>
