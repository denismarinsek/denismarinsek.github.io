<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVA</title>

<!-- Google font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" type="image/png" href="Slike/Naslovna.png">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --green: #004B49;
    --green-hover: #006A4E;
    --bg: #f7f7f7;
    --text: #222;
    --border: #d0d0d0;
    --shadow: 0 2px 8px rgba(0,0,0,0.05);
    --shadow-hover: 0 8px 18px rgba(0,0,0,0.10);
}

* {
    box-sizing: border-box;
}

body {
    font-family: 'Inter', Arial, sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
}

/* HEADER */
.header {
    text-align: center;
    padding: 40px 20px;
    background: white;
    border-bottom: 1px solid #ececec;
}

.header h1 {
    margin: 0;
    font-size: 34px;
    font-weight: 700;
    color: var(--green);
}

/* CONTENT */
.content {
    max-width: 1000px;
    margin: 0 auto;
    padding: 35px 20px 50px 20px;
}

/* HOME IKONA */
.back-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    margin-bottom: 25px;
    text-decoration: none;
    color: #222;
    background: #f0f0f0;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 20px;
    transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    box-shadow: var(--shadow);
}

.back-link:hover {
    background: var(--green);
    color: white;
    box-shadow: var(--shadow-hover);
}

/* YEAR */
.year {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 20px;
    margin-top: 0;
}

/* NASLOVI */
h3 {
    font-size: 22px;
    font-weight: 600;
    margin-top: 30px;
    margin-bottom: 12px;
}

/* SEZNAM */
ul {
    list-style: none;
    padding: 0;
    margin-top: 10px;
}

li {
    margin: 12px 0;
}

/* GUMBI */
.exam-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;

    padding: 8px 14px;
    background: white;
    color: var(--green);
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;

    border-radius: 6px;

    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    border-left: 4px solid var(--green);
    border-right: 4px solid var(--green);

    box-shadow: var(--shadow);

    transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
}

.exam-button:hover {
    background: var(--green);
    color: white;
    box-shadow: var(--shadow-hover);
}

/* ČRTA */
hr {
    border: none;
    border-top: 1px solid #ddd;
    margin: 35px 0;
}

/* MOBILE */
@media (max-width: 700px) {
    .header h1 {
        font-size: 28px;
    }

    .content {
        padding: 25px 15px 40px 15px;
    }

    .year {
        font-size: 24px;
    }

    h3 {
        font-size: 20px;
    }

    .back-link {
        width: 40px;
        height: 40px;
        font-size: 18px;
    }

    .exam-button {
        font-size: 14px;
        padding: 7px 12px;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>MVA</h1>
</div>

<div class="content">

    <!-- HOME IKONA -->
    <a class="back-link" href="predmeti.html" aria-label="Nazaj na predmete">
        <i class="fa-solid fa-house"></i>
    </a>

    <p class="year">2026/2027</p>

    <h3>Exam terms</h3>
    <ul>
        <li><a href="#" class="exam-button">Exam term 1</a></li>
        <li><a href="#" class="exam-button">Exam term 2</a></li>
    </ul>

    <hr>

</div>

</body>
</html>
