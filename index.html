    <style>
        :root {
            --green: #004B49;
            --bg: #f7f7f7;
            --text: #222;
            --muted: #555;
            --muted-2: #777;
            --border: #d0d0d0;
            --shadow: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-hover: 0 8px 18px rgba(0,0,0,0.10);
        }

        * {
            box-sizing: border-box;
        }

        html {
            width: 100%;
            overflow-y: scroll;                 /* vedno rezervira prostor za scrollbar */
            scrollbar-gutter: stable both-edges; /* prepreči layout shift */
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            position: relative;
        }

        img, video, svg {
            max-width: 100%;
            height: auto;
        }

        /* SUBTILNA ANIMACIJA OB NALAGANJU */
        .header,
        .content,
        footer {
            animation: fadeUp 0.65s ease both;
        }

        .content {
            animation-delay: 0.08s;
        }

        footer {
            animation-delay: 0.12s;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 64px 20px 42px 20px;
            background: white;
            border-bottom: 1px solid #ececec;
            width: 100%;
        }

        .header h1 {
            margin: 0;
            font-size: 44px;
            font-weight: 700;
            letter-spacing: -0.03em;
            text-transform: uppercase;
            color: var(--green);
        }

        .subtitle {
            margin-top: 14px;
            font-size: 20px;
            color: var(--muted);
            font-weight: 400;
        }

        .subtitle-en {
            font-size: 18px;
            color: var(--muted-2);
            margin-top: 2px;
        }

        .divider {
            width: 46px;
            height: 2px;
            background: var(--green);
            margin: 24px auto;
            border-radius: 2px;
        }

        .affiliation {
            font-size: 18px;
            color: #444;
            margin-top: 4px;
        }

        .email {
            margin-top: 10px;
        }

        .email-link {
            color: #222;
            text-decoration: none;
            transition: color 0.18s ease;
        }

        .email-link:hover {
            color: var(--green);
        }

        .linkedin-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            margin-top: 18px;
            color: white;              /* bela ikona */
            background: var(--green);   /* zelena podlaga */
            text-decoration: none;
            font-size: 28px;
            border-radius: 10px;
            opacity: 0.98;
            transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
            -webkit-tap-highlight-color: transparent;
            box-shadow: var(--shadow);
        }

        .linkedin-icon:hover {
            background: var(--green);   /* IDENTIČNO kot ostali gumbi */
            opacity: 1;
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .linkedin-icon:active {
            transform: translateY(0);
        }

        /* CONTENT */
        .content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 42px 20px 64px 20px;
            width: 100%;
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 18px;
            width: 100%;
        }

        .subject-card {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 82px;
            padding: 22px 18px;
            background: white;
            border-radius: 12px;
            text-decoration: none;
            color: #222;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            border-left: 4px solid var(--green);
            border-right: 4px solid var(--green);
            box-shadow: var(--shadow);
            transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, color 0.18s ease, border-color 0.18s ease;
            -webkit-tap-highlight-color: transparent;
            width: 100%;
            max-width: 100%;
        }

        .subject-card:hover {
            background: var(--green);
            color: white;
            border-color: var(--green);
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .subject-card:active {
            transform: translateY(0);
        }

        footer {
            text-align: center;
            padding: 18px;
            font-size: 14px;
            color: var(--muted-2);
            border-top: 1px solid #e5e5e5;
            background: var(--bg);
            width: 100%;
        }

        /* MOBILE */
        @media (max-width: 700px) {
            .header {
                padding: 42px 16px 32px 16px;
            }

            .header h1 {
                font-size: 32px;
            }

            .subtitle {
                font-size: 17px;
            }

            .subtitle-en {
                font-size: 15px;
            }

            .affiliation {
                font-size: 16px;
            }

            .content {
                padding: 30px 16px 42px 16px;
            }

            .subject-grid {
                grid-template-columns: 1fr;
            }

            .subject-card {
                min-height: 64px;
                font-size: 15px;
            }
        }

        @media (max-width: 420px) {
            .header h1 {
                font-size: 28px;
            }

            .subtitle {
                font-size: 16px;
            }

            .subtitle-en {
                font-size: 14px;
            }

            .affiliation {
                font-size: 15px;
            }

            .subject-card {
                font-size: 14px;
                padding: 18px 14px;
            }
        }
    </style>
</head>

<body>
