    <!-- Favicon / ikona -->
    <link rel="icon" type="image/png" href="Slike/Naslovna.png">
    <link rel="shortcut icon" type="image/png" href="Slike/Naslovna.png">
    <link rel="apple-touch-icon" href="Slike/Naslovna.png">

    <!-- Open Graph -->
    <meta property="og:title" content="Denis Marinšek" />
    <meta property="og:description" content="Docent za področje statistike – Ekonomska fakulteta, UL." />

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FFGZQE5WS5"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --green: #004B49;
            --green-hover: #006A4E;
            --bg: #f7f7f7;
            --text: #222;
            --muted: #444;
            --border: #d0d0d0;
            --shadow: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-hover: 0 8px 18px rgba(0,0,0,0.10);
        }

        * {
            box-sizing: border-box;
        }

        html {
            width: 100%;
            overflow-y: scroll;
            scrollbar-gutter: stable both-edges;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 48px 20px 32px 20px;
            background: white;
            border-bottom: 1px solid #ececec;
        }

        .header h1 {
            margin: 0;
            font-size: 34px;
            letter-spacing: -0.02em;
            font-weight: 700;
            color: var(--green); /* ZELENA */
        }

        .header p {
            margin: 8px 0 0 0;
            color: #444;
            font-size: 18px;
        }

        /* CONTENT */
        .content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 35px 20px 50px 20px;
        }

        /* HOME IKONA */
        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            margin-bottom: 25px;
            text-decoration: none;
            color: #222;
            background: #f0f0f0;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 20px;
            transition: all 0.18s ease;
            box-shadow: var(--shadow);
        }

        .back-link:hover {
            background: var(--green);
            color: white;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .back-link:active {
            transform: translateY(0);
        }

        /* SUBJECT GRID */
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 18px;
            margin-top: 10px;
        }

        /* SUBJECT CARD */
        .subject-card {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            padding: 24px 18px;
            background: white;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            font-size: 16px;
            font-weight: 600;
            text-align: center;

            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            border-left: 4px solid var(--green);
            border-right: 4px solid var(--green);

            box-shadow: var(--shadow);
            transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, color 0.18s ease;

            width: 100%;
        }

        .subject-card:hover {
            background: var(--green);
            color: white;
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .subject-card:active {
            transform: translateY(0);
        }

        /* MOBILE */
        @media (max-width: 700px) {
            .header {
                padding: 32px 16px 24px 16px;
            }

            .header h1 {
                font-size: 28px;
                line-height: 1.15;
            }

            .header p {
                font-size: 16px;
            }

            .content {
                padding: 24px 16px 36px 16px;
            }

            .subject-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .subject-card {
                min-height: 64px;
                padding: 18px 14px;
                font-size: 15px;
                border-radius: 10px;
            }

            .back-link {
                width: 40px;
                height: 40px;
                font-size: 18px;
                margin-bottom: 20px;
            }
        }

        @media (max-width: 420px) {
            .header h1 {
                font-size: 24px;
            }

            .header p {
                font-size: 15px;
            }

            .subject-card {
                font-size: 14px;
                padding: 16px 12px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>COURSES</h1>
    </div>

    <div class="content">

        <!-- HOME IKONA -->
        <a class="back-link" href="index.html" aria-label="Nazaj na začetno stran">
            <i class="fa-solid fa-house"></i>
        </a>

        <div class="subject-grid">
            <a class="subject-card" href="mtrd.html">MTRD</a>
            <a class="subject-card" href="rmt.html">RMT</a>
            <a class="subject-card" href="mva.html">MVA</a>
            <a class="subject-card" href="ada.html">ADA</a>
        </div>

    </div>

</body>
</html>
